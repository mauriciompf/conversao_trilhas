<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversão de trilhas</title>

    <meta
      name="description"
      content="Apresentação da disciplina de Conversão de trilhas da UNIASSELVI"
    />
    <meta
      name="keywords"
      content="Trilha de aprendizagem, Conversão de trilhas, Uniasselvi, EAD, Ensino Superior, Ciências Humanas, Apresentação"
    />

    <link rel="icon" type="image/png" href="/img/favicon.png" />

    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap"
      />
    </noscript>

    <!-- CSS -->
    <link rel="stylesheet" href="/css/normalize.css" />
    <link rel="stylesheet" href="/css/var_humanas.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/background.css" />
    <link rel="stylesheet" href="/placeholder_4etapas/css/style.css" />

    <!-- JS -->
    <script defer src="/js/progressbar.min.js"></script>
    <script defer src="/js/main.js"></script>
    <script src="/js/lazysizes.min.js"></script>

    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div>
      <div>
        <div
          class="fixed top-0 right-0 left-0 z-50 border-b-2 border-yellow-500 bg-white shadow-md"
        >
          <div class="container mx-auto px-4 py-3">
            <div class="flex flex-wrap items-center gap-2">
              <h1 class="text-xl! font-bold">CONVERSÃO DE TRILHAS</h1>
              <span>|</span>

              <label
                class="cursor-pointer rounded-xl bg-gray-200 px-6 py-2 underline select-none hover:bg-gray-300 focus:bg-gray-300"
                for="arquivo"
                >Adicionar Arquivo
                <input
                  accept=".doc,.docx,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                  type="file"
                  class="hidden"
                  id="arquivo"
                />
              </label>

              <button
                type="button"
                class="removeFileBtn cursor-pointer rounded-xl bg-gray-200 px-6 py-2 underline opacity-50 select-none hover:bg-gray-300 focus:bg-gray-300"
              >
                Excluir Arquivo Atual
              </button>

              <span>|</span>

              <button
                type="button"
                class="downloadBtn cursor-pointer rounded-xl bg-gray-200 px-6 py-2 underline opacity-50 select-none hover:bg-gray-300 focus:bg-gray-300"
              >
                Baixar trilha
              </button>

              <span>|</span>

              <h2 class="text-sm">WORD (DOCX, DOC) => HTML</h2>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Host -->
    <div class="mt-25">
      <div class="content-text reset-element"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
