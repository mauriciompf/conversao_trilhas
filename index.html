<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>templateCode</title>

    <meta
      name="description"
      content="Apresentação da disciplina de templateCode da UNIASSELVI"
    />
    <meta
      name="keywords"
      content="Trilha de aprendizagem, templateCode, Uniasselvi, EAD, Ensino Superior, Ciências Humanas, Apresentação"
    />

    <link rel="icon" type="image/png" href="templates/img/favicon.png" />

    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap"
      />
    </noscript>

    <link rel="stylesheet" href="./templates/css/normalize.css" />
    <link rel="stylesheet" href="./templates/css/var_humanas.css" />
    <link rel="stylesheet" href="./templates/css/style.css" />
    <link rel="stylesheet" href="./templates/css/background.css" />
    <link rel="stylesheet" href="./templates/apres_4_etapas/css/style.css" />

    <script defer src="./templates/js/progressbar.min.js"></script>
    <script defer src="./templates/js/main.js"></script>
    <script src="./templates/js/lazysizes.min.js"></script>

    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main>
      <section class="m-6 pb-6 border-b-2 border-yellow-500">
        <div class="mx-auto w-[70%]">
          <h1 class="font-bold">CONVERSÃO DE TRILHAS</h1>
          <h2 class="font-bold">WORD (DOCX, DOC) => HTML</h2>

          <div class="mt-6 flex items-center gap-2">
            <p>Adicionar arquivo word (roteiro):</p>

            <label
              class="cursor-pointer underline rounded-xl select-none bg-gray-200 p-2 hover:bg-gray-300 focus:bg-gray-300"
              for="arquivo"
              >Add Arquivo
              <input
                accept=".doc,.docx,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                type="file"
                class="hidden"
                id="arquivo"
              />
            </label>

            <img src="" alt="" />

            <button
              type="button"
              class="removeFileBtn cursor-pointer underline rounded-xl select-none bg-gray-200 p-2 opacity-50 hover:bg-gray-300 focus:bg-gray-300"
            >
              Excluir arquivo
            </button>
          </div>
        </div>
      </section>
    </main>

    <div>
      <div class="content-text reset-element"></div>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
